spring.application.name=backend
# ?? ?? ?? (?? 8080)
server.port=8080
logging.level.org.springframework.web.client.RestTemplate=DEBUG
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.jakarta.persistence.jdbc.url=${spring.datasource.url}
spring.jpa.properties.jakarta.persistence.jdbc.user=${spring.datasource.username}
spring.jpa.properties.jakarta.persistence.jdbc.password=${spring.datasource.password}
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/fintech}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:fintech}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:fintech}
spring.datasource.driver-class-name=org.postgresql.Driver

# KIS API settings (read from environment variables)
kis.app-key=${KIS_APP_KEY:}
kis.app-secret=${KIS_APP_SECRET:}
kis.url-base=${KIS_URL_BASE:https://openapivts.koreainvestment.com:29443}
kis.tr-id=${KIS_TR_ID:FHKST03010100}

# auth settings
auth.jwt-secret=${AUTH_JWT_SECRET:change-me-dev-secret-please}
auth.jwt-expire-seconds=${AUTH_JWT_EXPIRE_SECONDS:86400}
