spring.application.name=backend
# ?? ?? ?? (?? 8080)
server.port=8080
logging.level.org.springframework.web.client.RestTemplate=DEBUG
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.jakarta.persistence.jdbc.url=${spring.datasource.url}
spring.jpa.properties.jakarta.persistence.jdbc.user=${spring.datasource.username}
spring.jpa.properties.jakarta.persistence.jdbc.password=${spring.datasource.password}
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/fintech}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:fintech}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:fintech}
spring.datasource.driver-class-name=org.postgresql.Driver

# KIS API settings (read from environment variables)
kis.app-key=${KIS_APP_KEY:}
kis.app-secret=${KIS_APP_SECRET:}
kis.url-base=${KIS_URL_BASE:https://openapivts.koreainvestment.com:29443}
kis.tr-id=${KIS_TR_ID:FHKST03010100}
kis.tr-id-quote=${KIS_TR_ID_QUOTE:FHKST01010100}
kis.tr-id-orderbook=${KIS_TR_ID_ORDERBOOK:FHKST01010200}
kis.market-div-codes=${KIS_MARKET_DIV_CODES:J,Q}
stock.db-cache-cutoff-date=${STOCK_DB_CACHE_CUTOFF_DATE:2026-02-28}

# auth settings
auth.jwt-secret=${AUTH_JWT_SECRET:change-me-dev-secret-please}
auth.jwt-expire-seconds=${AUTH_JWT_EXPIRE_SECONDS:86400}

# simulation time mode
sim.time.mode=${SIM_TIME_MODE:LIVE}
sim.time.tick-seconds=${SIM_TIME_TICK_SECONDS:60}
sim.time.step-days=${SIM_TIME_STEP_DAYS:0}
sim.time.zone-id=${SIM_TIME_ZONE_ID:Asia/Seoul}

# async order queue
sim.order.queue.async-enabled=${SIM_ORDER_ASYNC_ENABLED:false}
sim.order.queue.poll-millis=${SIM_ORDER_POLL_MILLIS:1000}
sim.order.queue.batch-size=${SIM_ORDER_BATCH_SIZE:200}
sim.order.queue.max-retries=${SIM_ORDER_MAX_RETRIES:3}

# real trading broker
trading.broker.provider=${TRADING_BROKER_PROVIDER:SSAFY}
trading.broker.mock-enabled=${TRADING_BROKER_MOCK_ENABLED:true}
trading.broker.base-url=${TRADING_BROKER_BASE_URL:}
trading.broker.account-snapshot-path=${TRADING_BROKER_ACCOUNT_SNAPSHOT_PATH:/api/v1/accounts/{accountNo}/snapshot}
trading.broker.order-path=${TRADING_BROKER_ORDER_PATH:/api/v1/orders}
trading.broker.order-status-path=${TRADING_BROKER_ORDER_STATUS_PATH:/api/v1/orders/{brokerOrderId}}
trading.broker.app-key=${TRADING_BROKER_APP_KEY:}
trading.broker.app-secret=${TRADING_BROKER_APP_SECRET:}
trading.broker.auth-header-name=${TRADING_BROKER_AUTH_HEADER_NAME:Authorization}
trading.broker.token-prefix=${TRADING_BROKER_TOKEN_PREFIX:Bearer }
trading.broker.app-key-header-name=${TRADING_BROKER_APP_KEY_HEADER_NAME:X-APP-KEY}
trading.broker.app-secret-header-name=${TRADING_BROKER_APP_SECRET_HEADER_NAME:X-APP-SECRET}
