services:
  postgres:
    image: postgres:16
    container_name: fintech-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fintech}
      POSTGRES_USER: ${POSTGRES_USER:-fintech}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-this-password}
      TZ: Asia/Seoul
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks:
      - fintech-net

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: fintech-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      TZ: Asia/Seoul
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-fintech}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-fintech}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-change-this-password}
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET:-change-me-prod-secret}
      KIS_APP_KEY: ${KIS_APP_KEY:-}
      KIS_APP_SECRET: ${KIS_APP_SECRET:-}
      KIS_URL_BASE: ${KIS_URL_BASE:-https://openapivts.koreainvestment.com:29443}
      KIS_TR_ID: ${KIS_TR_ID:-FHKST03010100}
      SIM_TIME_MODE: ${SIM_TIME_MODE:-REPLAY}
      SIM_TIME_TICK_SECONDS: ${SIM_TIME_TICK_SECONDS:-60}
      SIM_TIME_STEP_DAYS: ${SIM_TIME_STEP_DAYS:-1}
      SIM_TIME_ZONE_ID: ${SIM_TIME_ZONE_ID:-Asia/Seoul}
      SIM_ORDER_ASYNC_ENABLED: ${SIM_ORDER_ASYNC_ENABLED:-false}
      SIM_ORDER_POLL_MILLIS: ${SIM_ORDER_POLL_MILLIS:-1000}
      SIM_ORDER_BATCH_SIZE: ${SIM_ORDER_BATCH_SIZE:-200}
      SIM_ORDER_MAX_RETRIES: ${SIM_ORDER_MAX_RETRIES:-3}
    expose:
      - "8080"
    networks:
      - fintech-net

  nginx:
    build:
      context: .
      dockerfile: deploy/nginx/Dockerfile
    container_name: fintech-nginx
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
    networks:
      - fintech-net

volumes:
  postgres_data:

networks:
  fintech-net:
